<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Sats Calculator | LivingOnBTC</title>
    <meta name="description" content="Calculate your Bitcoin sats from fiat income. See hourly, weekly, monthly & yearly earnings in real-time.">
    <link rel="canonical" href="https://livingonbtc.com/sats-per-hour.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --btc-orange: #f7931a; --bg-dark: #0d0d0d; --bg-card: #161616; --bg-elevated: #1e1e1e; --border-subtle: #2a2a2a; --text-primary: #ffffff; --text-secondary: #888888; --success: #00c853; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; padding: 20px; }
        .page-wrapper { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #f7931a, #ff6b35); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .header p { color: var(--text-secondary); }
        .hero-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 40px; text-align: center; margin-bottom: 24px; position: relative; overflow: hidden; }
        .hero-card::before { content: ''; display: block; height: 3px; background: linear-gradient(90deg, #f7931a, #ff6b35); border-radius: 24px 24px 0 0; margin: -40px -40px 24px -40px; }
        .hero-label { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .sats-display { font-size: 4rem; font-weight: 800; color: var(--btc-orange); line-height: 1; margin-bottom: 8px; }
        .fiat-display { font-size: 1.125rem; color: var(--text-secondary); margin-bottom: 4px; }
        .period-label { font-size: 0.875rem; color: var(--text-secondary); }
        .live-indicator { display: inline-flex; align-items: center; gap: 6px; background: rgba(0, 200, 83, 0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-top: 16px; }
        .live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }
        .input-group { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 20px; }
        .input-group label { display: block; font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 14px 16px; font-size: 1.125rem; font-weight: 600; color: var(--text-primary); outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: var(--btc-orange); }
        .chart-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 24px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .chart-title { font-size: 1.125rem; font-weight: 600; }
        .time-buttons { display: flex; gap: 8px; background: var(--bg-elevated); padding: 4px; border-radius: 12px; }
        .time-buttons button { background: transparent; border: none; color: var(--text-secondary); padding: 8px 16px; font-size: 0.875rem; font-weight: 500; border-radius: 8px; cursor: pointer; }
        .time-buttons button.active { background: var(--btc-orange); color: #000; }
        .chart-container { height: 300px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; margin-bottom: 24px; }
        .footer { text-align: center; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border-subtle); color: #555; font-size: 0.875rem; }
        .footer a { color: var(--btc-orange); }
        .error-msg { color: #ff4444; font-size: 0.875rem; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to LivingOnBTC</a>
        
        <div class="header">
            <h1><i class="fas fa-bolt" style="color: var(--btc-orange);"></i> Sats Calculator</h1>
            <p>See how much Bitcoin you're earning in fiat</p>
        </div>
        
        <div class="hero-card">
            <div class="hero-label">Your Sats Earnings</div>
            <div class="sats-display" id="satsValue">—</div>
            <div class="fiat-display" id="fiatValue">—</div>
            <div class="period-label" id="periodLabel">per hour</div>
            <div class="live-indicator"><span class="live-dot"></span><span>LIVE</span></div>
        </div>
        
        <div class="input-grid">
            <div class="input-group">
                <label>Your income</label>
                <input type="number" id="income" value="15" min="0" step="0.01">
            </div>
            <div class="input-group">
                <label>Paid</label>
                <select id="period">
                    <option value="hourly">Hourly</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>
            <div class="input-group" style="grid-column: 1 / -1;">
                <label>Currency</label>
                <select id="currency">
                    <option value="gbp">🇬🇧 British Pound (£)</option>
                    <option value="usd">🇺🇸 US Dollar ($)</option>
                    <option value="eur">🇪🇺 Euro (€)</option>
                    <option value="jpy">🇯🇵 Japanese Yen (¥)</option>
                    <option value="cad">🇨🇦 Canadian Dollar (C$)</option>
                    <option value="aud">🇦🇺 Australian Dollar (A$)</option>
                </select>
            </div>
        </div>
        
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">Average Sats Over Time</div>
                <div class="time-buttons">
                    <button data-days="1" class="active">24H</button>
                    <button data-days="30">1M</button>
                    <button data-days="365">1Y</button>
                    <button data-days="1825">5Y</button>
                </div>
            </div>
            <div class="chart-container"><canvas id="chart"></canvas></div>
        </div>
        
        <div class="footer">Data from <a href="https://www.binance.com" target="_blank">Binance API</a> • Not financial advice</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const state = { currency: 'gbp', income: 15, period: 'hourly', chart: null, chartDays: 1 };
        
        const els = {
            satsValue: document.getElementById('satsValue'),
            fiatValue: document.getElementById('fiatValue'),
            periodLabel: document.getElementById('periodLabel'),
            income: document.getElementById('income'),
            period: document.getElementById('period'),
            currency: document.getElementById('currency'),
            chartCanvas: document.getElementById('chart'),
            timeButtons: document.querySelectorAll('.time-buttons button')
        };

        const binanceSymbols = { gbp: 'BTCGBP', usd: 'BTCUSDT', eur: 'BTCEUR', jpy: 'BTCJPY', cad: 'BTCCAD', aud: 'BTCAUD' };
        const currencyNames = { gbp: '£', usd: '$', eur: '€', jpy: '¥', cad: 'C$', aud: 'A$' };
        const periods = { hourly: 'per hour', weekly: 'per week', monthly: 'per month', yearly: 'per year' };
        const hoursInPeriod = { hourly: 1, weekly: 168, monthly: 730, yearly: 8760 };
        
        const fmt = num => new Intl.NumberFormat().format(Math.round(num || 0));

        async function getPrice() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${binanceSymbols[state.currency]}`);
                const data = await res.json();
                return parseFloat(data.price);
            } catch (e) { 
                console.error('Price error:', e); 
                return null; 
            }
        }

        async function getHistory(days) {
            try {
                const interval = days <= 1 ? '1h' : '1d';
                const limit = days <= 1 ? 24 : days <= 30 ? 30 : days <= 365 ? 365 : 730;
                const end = Math.floor(Date.now() / 1000);
                const start = end - (days * 24 * 60 * 60);
                
                const res = await fetch(
                    `https://api.binance.com/api/v3/klines?symbol=${binanceSymbols[state.currency]}&interval=${interval}&startTime=${start * 1000}&limit=${limit}`
                );
                const data = await res.json();
                if (!Array.isArray(data)) return [];
                return data.map(d => [d[0], parseFloat(d[4])]);
            } catch (e) { 
                console.error('History error:', e); 
                return []; 
            }
        }

        function calcSats(income, price) {
            if (!price || !income) return 0;
            const hourlyIncome = income / hoursInPeriod[state.period];
            return (hourlyIncome / price) * 100_000_000;
        }

        async function updateDisplay() {
            const price = await getPrice();
            
            if (price) {
                const sats = calcSats(state.income, price);
                els.satsValue.textContent = fmt(sats);
                els.fiatValue.textContent = `${currencyNames[state.currency]}${state.income.toLocaleString()}`;
                els.periodLabel.textContent = periods[state.period];
            } else {
                els.satsValue.textContent = '—';
                els.fiatValue.textContent = 'Loading...';
            }
        }

        async function updateChart() {
            const prices = await getHistory(state.chartDays);
            
            if (!prices.length) {
                console.log('No price data');
                return;
            }

            const data = prices.map(([time, price]) => ({
                x: time,
                y: calcSats(state.income, price)
            }));

            const labels = data.map(d => {
                const date = new Date(d.x);
                if (state.chartDays === 1) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                if (state.chartDays <= 30) return date.toLocaleDateString([], {month:'short', day:'numeric'});
                return date.toLocaleDateString([], {month:'short', year:'2-digit'});
            });

            if (state.chart) state.chart.destroy();

            state.chart = new Chart(els.chartCanvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data.map(d => d.y),
                        borderColor: '#f7931a',
                        backgroundColor: 'rgba(247, 147, 26, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', maxTicksLimit: 8 } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', callback: v => fmt(v) } }
                    }
                }
            });
        }

        // Events
        els.income.addEventListener('input', e => { state.income = parseFloat(e.target.value) || 0; updateDisplay(); updateChart(); });
        els.period.addEventListener('change', e => { state.period = e.target.value; updateDisplay(); updateChart(); });
        els.currency.addEventListener('change', e => { state.currency = e.target.value; updateDisplay(); updateChart(); });
        
        els.timeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                els.timeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.chartDays = parseInt(btn.dataset.days);
                updateChart();
            });
        });

        // Init
        updateDisplay();
        updateChart();
        setInterval(updateDisplay, 30000);
    </script>
</body>
</html>
