<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Sats Calculator | LivingOnBTC</title>
    <meta name="description" content="Calculate your Bitcoin sats from fiat income. See hourly, weekly, monthly & yearly earnings in real-time.">
    <link rel="canonical" href="https://livingonbtc.com/sats-per-hour.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --btc-orange: #f7931a; --bg-dark: #0d0d0d; --bg-card: #161616; --bg-elevated: #1e1e1e; --border-subtle: #2a2a2a; --text-primary: #ffffff; --text-secondary: #888888; --success: #00c853; --danger: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; padding: 20px; }
        .page-wrapper { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #f7931a, #ff6b35); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .header p { color: var(--text-secondary); }
        .hero-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 40px; text-align: center; margin-bottom: 24px; position: relative; overflow: hidden; aspect-ratio: 1 / 1; max-width: 400px; margin-left: auto; margin-right: auto; }
        .hero-card::before { content: ''; display: block; height: 3px; background: linear-gradient(90deg, #f7931a, #ff6b35); border-radius: 24px 24px 0 0; margin: -40px -40px 24px -40px; }
        .hero-card .watermark { position: absolute; bottom: 12px; right: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.3); font-weight: 600; }
        .hero-card .change-display { font-size: 1.25rem; font-weight: 800; margin-top: 8px; }
        .hero-label { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .sats-display { font-size: 4rem; font-weight: 800; color: var(--btc-orange); line-height: 1; margin-bottom: 8px; }
        .fiat-display { font-size: 1.125rem; color: var(--text-secondary); margin-bottom: 4px; }
        .period-label { font-size: 0.875rem; color: var(--text-secondary); }
        .change-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; margin-top: 8px; }
        .change-badge.up { background: rgba(0, 200, 83, 0.15); color: var(--success); }
        .change-badge.down { background: rgba(255, 68, 68, 0.15); color: var(--danger); }
        .live-indicator { display: inline-flex; align-items: center; gap: 6px; background: rgba(0, 200, 83, 0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-top: 12px; }
        .live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }
        .input-group { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 20px; }
        .input-group label { display: block; font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 14px 16px; font-size: 1.125rem; font-weight: 600; color: var(--text-primary); outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: var(--btc-orange); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        @media (max-width: 500px) { .stats-grid { grid-template-columns: 1fr; } }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        .stat-value.high { color: var(--success); }
        .stat-value.low { color: var(--danger); }
        
        .chart-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .chart-title { font-size: 1.125rem; font-weight: 600; }
        .time-buttons { display: flex; gap: 8px; background: var(--bg-elevated); padding: 4px; border-radius: 12px; }
        .time-buttons button { background: transparent; border: none; color: var(--text-secondary); padding: 8px 16px; font-size: 0.875rem; font-weight: 500; border-radius: 8px; cursor: pointer; }
        .time-buttons button.active { background: var(--btc-orange); color: #000; }
        .chart-container { height: 300px; }
        
        .share-btn { display: block; width: 100%; background: var(--btc-orange); color: #000; border: none; border-radius: 16px; padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; text-align: center; margin-bottom: 24px; transition: transform 0.2s; }
        .share-btn:hover { transform: scale(1.02); }
        
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; margin-bottom: 24px; }
        .footer { text-align: center; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border-subtle); color: #555; font-size: 0.875rem; }
        .footer a { color: var(--btc-orange); }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to LivingOnBTC</a>
        
        <div class="header">
            <h1><i class="fas fa-bolt" style="color: var(--btc-orange);"></i> Sats Calculator</h1>
            <p>See how much Bitcoin you're earning in fiat</p>
        </div>
        
            <div class="hero-card" id="heroCard">
            <div class="hero-label">Your Sats Earnings</div>
            <div class="sats-display" id="satsValue">—</div>
            <div class="fiat-display" id="fiatValue">—</div>
            <div class="period-label" id="periodLabel">per hour</div>
            <div class="change-display" id="changeDisplay" style="display:none;"></div>
            <div class="live-indicator"><span class="live-dot"></span><span>LIVE</span></div>
            <div class="watermark">livingonbtc.com</div>
        </div>
        
        <button class="share-btn" id="shareBtn">
            <i class="fas fa-share-alt"></i> Share This Tile
        </button>
        
        <div class="input-grid">
            <div class="input-group">
                <label>Your income</label>
                <input type="number" id="income" value="15" min="0" step="0.01">
            </div>
            <div class="input-group">
                <label>Paid</label>
                <select id="period">
                    <option value="hourly">Hourly</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>
            <div class="input-group" style="grid-column: 1 / -1;">
                <label>Currency</label>
                <select id="currency">
                    <option value="gbp">🇬🇧 British Pound (£)</option>
                    <option value="usd">🇺🇸 US Dollar ($)</option>
                    <option value="eur">🇪🇺 Euro (€)</option>
                    <option value="jpy">🇯🇵 Japanese Yen (¥)</option>
                    <option value="cad">🇨🇦 Canadian Dollar (C$)</option>
                    <option value="aud">🇦🇺 Australian Dollar (A$)</option>
                    <option value="sgd">🇸🇬 Singapore Dollar (S$)</option>
                    <option value="hkd">🇭🇰 Hong Kong Dollar (HK$)</option>
                    <option value="nzd">🇳🇿 New Zealand Dollar (NZ$)</option>
                    <option value="chf">🇨🇭 Swiss Franc (Fr)</option>
                </select>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Highest</div>
                <div class="stat-value high" id="statHigh">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average</div>
                <div class="stat-value" id="statAvg">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Lowest</div>
                <div class="stat-value low" id="statLow">—</div>
            </div>
        </div>
        
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">Average Sats Over Time</div>
                <div class="time-buttons">
                    <button data-days="1" class="active">24H</button>
                    <button data-days="30">1M</button>
                    <button data-days="365">1Y</button>
                    <button data-days="1825">5Y</button>
                </div>
            </div>
            <div class="chart-container"><canvas id="chart"></canvas></div>
        </div>
        
        <div class="footer">Data from <a href="https://www.coingecko.com" target="_blank">CoinGecko API</a> • Not financial advice</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const state = { 
            currency: localStorage.getItem('sats_currency') || 'gbp', 
            income: parseFloat(localStorage.getItem('sats_income')) || 15, 
            period: localStorage.getItem('sats_period') || 'hourly',
            chart: null, 
            chartDays: 1,
            currentPrice: null,
            previousPrice: null
        };
        
        const els = {
            satsValue: document.getElementById('satsValue'),
            fiatValue: document.getElementById('fiatValue'),
            periodLabel: document.getElementById('periodLabel'),
            changeDisplay: document.getElementById('changeDisplay'),
            income: document.getElementById('income'),
            period: document.getElementById('period'),
            currency: document.getElementById('currency'),
            chartCanvas: document.getElementById('chart'),
            timeButtons: document.querySelectorAll('.time-buttons button'),
            statHigh: document.getElementById('statHigh'),
            statAvg: document.getElementById('statAvg'),
            statLow: document.getElementById('statLow'),
            shareBtn: document.getElementById('shareBtn')
        };

        const currencyNames = { gbp: '£', usd: '$', eur: '€', jpy: '¥', cad: 'C$', aud: 'A$', sgd: 'S$', hkd: 'HK$', nzd: 'NZ$', chf: 'Fr' };
        const currencyFlags = { gbp: '🇬🇧', usd: '🇺🇸', eur: '🇪🇺', jpy: '🇯🇵', cad: '🇨🇦', aud: '🇦🇺', sgd: '🇸🇬', hkd: '🇭🇰', nzd: '🇳🇿', chf: '🇨🇭' };
        const periods = { hourly: 'per hour', weekly: 'per week', monthly: 'per month', yearly: 'per year' };
        const hoursInPeriod = { hourly: 1, weekly: 168, monthly: 730, yearly: 8760 };
        
        const fmt = num => new Intl.NumberFormat().format(Math.round(num || 0));

        // Set initial values from localStorage
        els.income.value = state.income;
        els.period.value = state.period;
        els.currency.value = state.currency;

        const COINGECKO_BASE = 'https://api.coingecko.com/api/v3';
        let priceCache = { price: null, timestamp: 0 };
        let historyCache = { data: null, days: 0, timestamp: 0 };
        const CACHE_DURATION = 60000;

        async function getPrice() {
            const now = Date.now();
            if (priceCache.price && now - priceCache.timestamp < CACHE_DURATION) {
                return priceCache.price;
            }
            try {
                const res = await fetch(`${COINGECKO_BASE}/simple/price?ids=bitcoin&vs_currencies=${state.currency}`);
                const data = await res.json();
                const price = data.bitcoin?.[state.currency];
                if (price) priceCache = { price, timestamp: now };
                return price;
            } catch (e) { console.error(e); return priceCache.price; }
        }

        async function getHistory(days) {
            const now = Date.now();
            if (historyCache.data && historyCache.days === days && now - historyCache.timestamp < CACHE_DURATION) {
                return historyCache.data;
            }
            try {
                const maxPoints = days <= 30 ? 30 : 100;
                const res = await fetch(`${COINGECKO_BASE}/coins/bitcoin/market_chart?vs_currency=${state.currency}&days=${days}`);
                
                if (!res.ok) {
                    console.log('API limit, using cache');
                    return historyCache.data || [];
                }
                
                const data = await res.json();
                let prices = data.prices || [];
                if (prices.length > maxPoints) {
                    const step = Math.ceil(prices.length / maxPoints);
                    prices = prices.filter((_, i) => i % step === 0);
                }
                if (prices.length) historyCache = { data: prices, days, timestamp: now };
                return prices;
            } catch (e) { console.error(e); return historyCache.data || []; }
        }

        function calcSats(income, price) {
            if (!price || !income) return 0;
            const hourlyIncome = income / hoursInPeriod[state.period];
            return (hourlyIncome / price) * 100_000_000;
        }

        async function updateDisplay() {
            state.currentPrice = await getPrice();
            
            if (state.currentPrice) {
                const sats = calcSats(state.income, state.currentPrice);
                els.satsValue.textContent = fmt(sats);
                els.fiatValue.textContent = `${currencyNames[state.currency]}${state.income.toLocaleString()}`;
                els.periodLabel.textContent = periods[state.period];
                
                // Compare with start of period
                const prices = await getHistory(state.chartDays);
                if (prices.length >= 2) {
                    const firstPrice = prices[0][1];
                    const change = ((state.currentPrice - firstPrice) / firstPrice) * 100;
                    const isBtcUp = change >= 0;
                    // Sats change is inverse of BTC change
                    const satsChange = -change;
                    
                    els.changeDisplay.style.display = 'block';
                    els.changeDisplay.style.color = satsChange >= 0 ? 'var(--success)' : 'var(--danger)';
                    els.changeDisplay.innerHTML = satsChange >= 0 
                        ? `<span style="color:var(--success)">▲ ${satsChange.toFixed(1)}%</span>`
                        : `<span style="color:var(--danger)">▼ ${Math.abs(satsChange).toFixed(1)}%</span>`;
                }
            } else {
                els.satsValue.textContent = '—';
                els.fiatValue.textContent = 'Loading...';
            }
        }

        async function updateStats() {
            const prices = await getHistory(state.chartDays);
            if (!prices.length) return;
            
            const satsData = prices.map(p => calcSats(state.income, p[1]));
            const high = Math.max(...satsData);
            const low = Math.min(...satsData);
            const avg = satsData.reduce((a, b) => a + b, 0) / satsData.length;
            
            els.statHigh.textContent = fmt(high);
            els.statAvg.textContent = fmt(avg);
            els.statLow.textContent = fmt(low);
        }

        async function updateChart() {
            const prices = await getHistory(state.chartDays);
            if (!prices.length) return;

            const data = prices.map(([time, price]) => ({
                x: time,
                y: calcSats(state.income, price)
            }));

            const labels = data.map(d => {
                const date = new Date(d.x);
                if (state.chartDays === 1) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                if (state.chartDays <= 30) return date.toLocaleDateString([], {month:'short', day:'numeric'});
                return date.toLocaleDateString([], {month:'short', year:'2-digit'});
            });

            if (state.chart) state.chart.destroy();

            state.chart = new Chart(els.chartCanvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data.map(d => d.y),
                        borderColor: '#f7931a',
                        backgroundColor: 'rgba(247, 147, 26, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', maxTicksLimit: 8 } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', callback: v => fmt(v) } }
                    }
                }
            });
            
            await updateStats();
        }

        // Save preferences
        function savePrefs() {
            localStorage.setItem('sats_currency', state.currency);
            localStorage.setItem('sats_income', state.income);
            localStorage.setItem('sats_period', state.period);
        }

        // Share functionality
        els.shareBtn.addEventListener('click', async () => {
            els.shareBtn.textContent = 'Generating...';
            
            try {
                // Get current sats value and change
                const satsText = els.satsValue.textContent;
                const fiatText = els.fiatValue.textContent;
                const periodText = els.periodLabel.textContent;
                const changeText = els.changeDisplay.innerHTML || '';
                const isUp = els.changeDisplay.innerHTML.includes('▲');
                
                // Create a square container for the capture
                const container = document.createElement('div');
                container.style.cssText = 'width: 500px; height: 500px; background: #161616; display: flex; align-items: center; justify-content: center; padding: 40px; box-sizing: border-box; flex-direction: column; position: relative;';
                container.innerHTML = `
                    <div style="font-size: 0.8rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em;">Your Sats Earnings</div>
                    <div style="font-size: 4rem; font-weight: 800; color: #f7931a; line-height: 1; margin-bottom: 8px;">${satsText}</div>
                    <div style="font-size: 1.2rem; color: #888; margin-bottom: 4px;">${fiatText} ${periodText}</div>
                    <div style="font-size: 2rem; font-weight: 800; margin-top: 16px; ${isUp ? 'color: #00c853;' : 'color: #ff4444;'}">${changeText}</div>
                    <div style="position: absolute; bottom: 20px; right: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.3);">livingonbtc.com</div>
                `;
                document.body.appendChild(container);
                
                const canvas = await html2canvas(container, {
                    backgroundColor: '#161616',
                    scale: 2
                });
                
                document.body.removeChild(container);
                
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'sats-calculator.png', { type: 'image/png' });
                    
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'My Sats Calculator',
                            text: `I'm earning ${els.satsValue.textContent} sats ${periods[state.period]}!`,
                            files: [file]
                        });
                    } else {
                        // Fallback: download image
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'sats-calculator.png';
                        a.click();
                        URL.revokeObjectURL(url);;
                        els.shareBtn.innerHTML = '<i class="fas fa-download"></i> Downloaded!';
                        setTimeout(() => els.shareBtn.innerHTML = '<i class="fas fa-share-alt"></i> Share Tile', 2000);
                        return;
                    }
                    els.shareBtn.innerHTML = '<i class="fas fa-check"></i> Shared!';
                    setTimeout(() => els.shareBtn.innerHTML = '<i class="fas fa-share-alt"></i> Share Tile', 2000);
                });
            } catch (e) {
                console.error(e);
                // Fallback to text
                const text = `I'm earning ${els.satsValue.textContent} sats ${periods[state.period]}!`;
                navigator.clipboard.writeText(text);
                els.shareBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => els.shareBtn.innerHTML = '<i class="fas fa-share-alt"></i> Share Tile', 2000);
            }
        });

        // Events
        els.income.addEventListener('input', e => { 
            state.income = parseFloat(e.target.value) || 0; 
            savePrefs();
            updateDisplay(); 
            updateChart(); 
        });
        els.period.addEventListener('change', e => { 
            state.period = e.target.value; 
            savePrefs();
            updateDisplay(); 
            updateChart(); 
        });
        els.currency.addEventListener('change', e => { 
            state.currency = e.target.value; 
            priceCache = { price: null, timestamp: 0 }; // Clear cache on currency change
            savePrefs();
            updateDisplay(); 
            updateChart(); 
        });
        
        els.timeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                els.timeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.chartDays = parseInt(btn.dataset.days);
                updateDisplay();
                updateChart();
            });
        });

        // Init
        updateDisplay();
        updateChart();
        setInterval(updateDisplay, 30000);
    </script>
</body>
</html>
