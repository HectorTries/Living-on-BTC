<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Backtester - See What Your Salary Would Be Worth</title>
    <link rel="stylesheet" href="blog-style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #0d1117; color: #e6edf3; }
        .calculator { background: #161b22; padding: 24px; border-radius: 12px; margin: 20px 0; }
        input, select { padding: 12px; margin: 8px 0; width: 100%; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin: 10px 0; }
        .btn { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; flex: 1; }
        .btn:hover { background: #2ea043; }
        .btn-outline { background: transparent; border: 1px solid #30363d; }
        .btn-outline.active { background: #f7931a; border-color: #f7931a; }
        #result { margin-top: 20px; padding: 16px; background: #0d1117; border-radius: 8px; }
        .sats { color: #f7931a; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <a href="index.html">← Back to Home</a>
    <h1>₿ Bitcoin Backtester</h1>
    <p>See what your salary would be worth if you'd been paid in Bitcoin.</p>
    
    <div class="calculator">
        <h3>Calculate Your Bitcoin Salary</h3>
        <label>Monthly Salary</label>
        <input type="number" id="salary" placeholder="e.g. 3000" value="3000">
        
        <label>Currency</label>
        <div class="btn-group">
            <button class="btn btn-outline active" onclick="setCurrency('GBP', '£')">£ GBP</button>
            <button class="btn btn-outline" onclick="setCurrency('USD', '$')">$ USD</button>
            <button class="btn btn-outline" onclick="setCurrency('EUR', '€')">€ EUR</button>
        </div>
        
        <label>Start Month</label>
        <input type="month" id="startMonth" value="2022-01">
        
        <button class="btn" onclick="calculate()">Calculate</button>
        
        <div id="result" style="display:none;"></div>
    </div>
    
    <canvas id="chart"></canvas>
    
    <script>
        let currentCurrency = 'GBP';
        let currencySymbol = '£';
        
        // Historical BTC prices (monthly average in GBP)
        const btcPrices = {
            '2022-01': 35000, '2022-02': 32000, '2022-03': 35000, '2022-04': 32000,
            '2022-05': 25000, '2022-06': 18000, '2022-07': 22000, '2022-08': 20000,
            '2022-09': 18000, '2022-10': 16000, '2022-11': 15000, '2022-12': 14000,
            '2023-01': 16000, '2023-02': 18000, '2023-03': 22000, '2023-04': 25000,
            '2023-05': 24000, '2023-06': 25000, '2023-07': 28000, '2023-08': 25000,
            '2023-09': 22000, '2023-10': 28000, '2023-11': 35000, '2023-12': 32000,
            '2024-01': 35000, '2024-02': 58000, '2024-03': 62000, '2024-04': 55000,
            '2024-05': 52000, '2024-06': 48000, '2024-07': 55000, '2024-08': 52000,
            '2024-09': 48000, '2024-10': 58000, '2024-11': 65000, '2024-12': 72000,
            '2025-01': 68000, '2025-02': 65000, '2025-03': 62000, '2025-04': 55000,
            '2025-05': 58000, '2025-06': 52000, '2025-07': 48500, '2025-08': 45000,
            '2025-09': 42000, '2025-10': 48000, '2025-11': 52000, '2025-12': 58000,
            '2026-01': 55000, '2026-02': 62000, '2026-03': 68500
        };
        
        function setCurrency(cur, sym) {
            currentCurrency = cur;
            currencySymbol = sym;
            document.querySelectorAll('.btn-outline').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function calculate() {
            const salary = parseFloat(document.getElementById('salary').value);
            const startMonth = document.getElementById('startMonth').value;
            
            if (!salary || !startMonth) {
                alert('Please enter a salary and start month');
                return;
            }
            
            // Convert salary to GBP for calculation
            let salaryGBP = salary;
            if (currentCurrency === 'USD') salaryGBP = salary * 0.79;
            if (currentCurrency === 'EUR') salaryGBP = salary * 0.86;
            
            const resultDiv = document.getElementById('result');
            let html = '<h3>Results</h3><table style="width:100%"><tr><th>Month</th><th>BTC Price</th><th>Your Salary in Sats</th></tr>';
            
            let months = Object.keys(btcPrices).filter(m => m >= startMonth).sort();
            let labels = [];
            let data = [];
            
            months.forEach(month => {
                const price = btcPrices[month];
                const sats = Math.round((salaryGBP / price) * 100000000);
                labels.push(month);
                data.push(sats);
                html += `<tr><td>${month}</td><td>${currencySymbol}${price.toLocaleString()}</td><td class="sats">${sats.toLocaleString()} sats</td></tr>`;
            });
            
            html += '</table>';
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
            
            // Draw chart
            const ctx = document.getElementById('chart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Sats per month',
                        data: data,
                        borderColor: '#f7931a',
                        backgroundColor: 'rgba(247, 147, 26, 0.1)',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#e6edf3' } } },
                    scales: {
                        y: { ticks: { color: '#e6edf3' }, grid: { color: '#30363d' } },
                        x: { ticks: { color: '#e6edf3' }, grid: { color: '#30363d' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
